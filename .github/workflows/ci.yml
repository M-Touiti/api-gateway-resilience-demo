name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test -pl gateway-service -Dtest="**/unit/**" --no-transfer-progress

      - name: Run integration tests
        run: mvn test -pl gateway-service -Dtest="**/integration/**" --no-transfer-progress

      - name: Build all modules
        run: mvn clean package -DskipTests --no-transfer-progress
